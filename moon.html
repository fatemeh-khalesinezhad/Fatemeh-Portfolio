<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23e8e8e8'/><circle cx='35' cy='30' r='8' fill='%23999'/><circle cx='55' cy='45' r='12' fill='%23aaa'/><circle cx='42' cy='65' r='6' fill='%23999'/></svg>"><!-- GSAP Library for Advanced Animations -->
<title>Moon Simulation</title>

<!-- FINAL MERGED CSS -->
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  canvas {
    width: 100%;
    height: 100%;
    vertical-align: bottom;
    display: block;
  }
</style>

<!-- THREE.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/108/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@2410ad1a8f5844df00191600eafda59def537830/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

<script>
/* ======================
   TEXTURES
====================== */
var textureURL = "https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/lroc_color_poles_1k.jpg";
var displacementURL = "https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/ldem_3_8bit.jpg";
var worldURL = "https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/hipp8_s.jpg";

/* ======================
   SCENE
====================== */
var scene = new THREE.Scene();

var camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  2000
);
camera.position.z = 5;

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ======================
   CONTROLS
====================== */
var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.enableDamping = true;

/* ======================
   MOON
====================== */
var geometry = new THREE.SphereGeometry(2, 60, 60);
var loader = new THREE.TextureLoader();

var texture = loader.load(textureURL);
var displacementMap = loader.load(displacementURL);

var material = new THREE.MeshPhongMaterial({
  map: texture,
  displacementMap: displacementMap,
  displacementScale: 0.06,
  bumpMap: displacementMap,
  bumpScale: 0.04,
  shininess: 0,
  reflectivity: 0
});

var moon = new THREE.Mesh(geometry, material);
scene.add(moon);

/* ======================
   LIGHTING
====================== */
var light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(-100, 10, 50);
scene.add(light);

var hemiLight = new THREE.HemisphereLight(0xffffff, 0xffffff, 0.1);
scene.add(hemiLight);

/* ======================
   STAR BACKGROUND
====================== */
var worldTexture = loader.load(worldURL);
var worldGeometry = new THREE.SphereGeometry(1000, 60, 60);
var worldMaterial = new THREE.MeshBasicMaterial({
  map: worldTexture,
  side: THREE.BackSide
});
var world = new THREE.Mesh(worldGeometry, worldMaterial);
scene.add(world);

/* ======================
   INITIAL ROTATION
====================== */
moon.rotation.x = Math.PI * 0.02;
moon.rotation.y = Math.PI * 1.54;

/* ======================
   ANIMATION
====================== */
function animate() {
  requestAnimationFrame(animate);

  moon.rotation.y += 0.002;
  moon.rotation.x += 0.0001;

  world.rotation.y += 0.0001;
  world.rotation.x += 0.0005;

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ======================
   RESIZE
====================== */
window.addEventListener("resize", function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
